name: Passo 3

on:
  push:
    branches:
      - main
    paths:
      - ".github/prompts/**"
      - "**/*.prompt.md"
      - "config.json"
      - "assignments/**"

permissions:
  contents: read
  actions: write
  issues: write

env:
  STEP_4_FILE: ".github/steps/4-step.md"

jobs:
  find_exercise:
    name: Encontrar Issue do Exercício
    if: github.run_number != 1
    uses: dev-pods/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.1.1

  check_step_work:
    name: Verificar trabalho do passo
    needs: [find_exercise]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.0

      - name: Find last comment
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: Update comment - checking work
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: .github/translations/checking-work.md
          edit-mode: replace

      # START: Check practical exercise

      - name: Check if new-assignment.prompt.md exists
        id: check-file-exists
        continue-on-error: true
        uses: skills/exercise-toolkit/actions/file-exists@v0.7.0
        with:
          file: ".github/prompts/new-assignment.prompt.md"

      - name: Check for new assignment directory created
        id: check-new-assignment-dir
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const knownAssignments = ['python-basics', 'games-in-python', 'python-classes', 'data-analysis'];

            const dirs = fs.readdirSync('assignments', { withFileTypes: true })
              .filter(dirent => dirent.isDirectory())
              .map(dirent => dirent.name);

            const newDirs = dirs.filter(dir => !knownAssignments.includes(dir));

            if (newDirs.length > 0) {
              const message = `Novo diret\u00f3rio de tarefa encontrado`;
              core.setOutput('STEP_MESSAGE', message);
            } else {
              const message = 'Nenhum novo diret\u00f3rio de tarefa encontrado em assignments/';
              core.setOutput('STEP_MESSAGE', message);
              core.setFailed(message);
            }

      - name: Check that new assignment was added to config.json
        id: check-config-updated
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const config = JSON.parse(fs.readFileSync('config.json', 'utf8'));
            const assignments = config.assignments || [];

            if (assignments.length > 4) {
              const message = `Encontrados ${assignments.length} assignments em config.json (esperado mais de 4)`;
              core.setOutput('STEP_MESSAGE', message);
            } else {
              const message = `Encontrados ${assignments.length} assignments em config.json (esperado mais de 4)`;
              core.setOutput('STEP_MESSAGE', message);
              core.setFailed(message);
            }

      - name: Update comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: .github/translations/step-results-table.md
          vars: |
            step_number: 3
            results_table:
              - description: "Arquivo new-assignment.prompt.md criado"
                passed: ${{ steps.check-file-exists.outcome == 'success' }}
              - description: ${{ steps.check-new-assignment-dir.outputs.STEP_MESSAGE }}
                passed: ${{ steps.check-new-assignment-dir.outcome == 'success' }}
              - description: ${{ steps.check-config-updated.outputs.STEP_MESSAGE }}
                passed: ${{ steps.check-config-updated.outcome == 'success' }}

      # END: Check practical exercise

      - name: Fail job if not all checks passed
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: Postar conteúdo do próximo passo
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.0

      - name: Create comment - step finished
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: .github/translations/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 4

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_4_FILE }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: .github/translations/watching-for-progress.md

      - name: Disable current workflow and enable next one
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Passo 4"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
